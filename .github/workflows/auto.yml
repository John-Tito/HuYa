name: 虎牙虎粮自动发放

on:
  schedule:
    - cron: '17 23 * * *'
  workflow_dispatch:
    inputs:
      rooms:
        description: '房间号，逗号分隔'
        required: false
        default: ''

jobs:
  send-hl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 Python 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 包
        run: pip install -r requirements.txt

      - name: 检查 HUYA_COOKIE
        run: |
          if [ -z "${{ secrets.HUYA_COOKIE }}" ]; then
            echo "❌ 未配置 HUYA_COOKIE"
            exit 1
          fi

      - name: 获取房间号
        id: get-rooms
        run: |
          if [ -n "${{ github.event.inputs.rooms }}" ]; then
            echo "rooms=${{ github.event.inputs.rooms }}" >> $GITHUB_OUTPUT
          else
            if [ -z "${{ secrets.HUYA_ROOMS }}" ]; then
              echo "❌ 未配置 HUYA_ROOMS"
              exit 1
            fi
            echo "rooms=${{ secrets.HUYA_ROOMS }}" >> $GITHUB_OUTPUT
          fi

      - name: 运行虎粮发放
        env:
          HUYA_COOKIE: ${{ secrets.HUYA_COOKIE }}
          HUYA_ROOMS: ${{ steps.get-rooms.outputs.rooms }}
        run: |
          MAX_RETRY=2        # 最多重试 2 次
          RETRY_DELAY=300    # 每次重试间隔 300 秒 = 5 分钟
          count=0
          until python main.py; do
            count=$((count+1))
            if [ $count -ge $MAX_RETRY ]; then
              echo "❌ 已重试 $MAX_RETRY 次，任务失败"
              exit 1
            fi
            echo "⚠️ 执行失败，等待 $RETRY_DELAY 秒后重试（第 $count 次）"
            sleep $RETRY_DELAY
          done

          echo "✅ 虎粮发放完成"
